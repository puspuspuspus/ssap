<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Monitoring Diklat - Akses Portal</title>
    <meta http-equiv="refresh" content="3; url=https://720955691cbf04.lhr.life">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e676;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader { 
            border: 3px solid rgba(255, 255, 255, 0.1); 
            border-top: 3px solid var(--primary); 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin: 0 0 0.5rem; font-weight: 700; letter-spacing: -0.025em; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
        .link-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader"></div>
        <h2>Menghubungkan...</h2>
        <p>Mohon tunggu sebentar, Anda akan dialihkan ke server Monitoring Diklat terbaru.</p>
        <div class="link-box">
            <a href="https://720955691cbf04.lhr.life">https://720955691cbf04.lhr.life</a>
        </div>
    </div>
    <div style="position: fixed; bottom: 15px; right: 20px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.3); font-family: 'Inter', sans-serif;">Idea & Vision by Goy</div>
    <script>
        setTimeout(function() {
            window.location.href = "https://720955691cbf04.lhr.life";
        }, 5000);
    </script>

</body>
</html>
